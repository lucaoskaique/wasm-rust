<!DOCTYPE html>
<html>
<head>
    <title>Angel API Client WASM Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; font-size: 14px; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🚀 Angel API Client WASM Test</h1>
    
    <div id="results"></div>
    
    <button onclick="testClientCreation()">Test Client Creation</button>
    <button onclick="testLoginCall()">Test Login Call</button>
    <button onclick="testRealLogin()">Test Real Login</button>
    
    <script type="module">
        import init, { Client, LoginRequest, setup_panic_hook } from './pkg-bundler/angel_api_client_wasm.js';
        
        // Initialize WASM
        await init();
        setup_panic_hook();
        
        // Make functions available globally for button clicks
        window.testClientCreation = testClientCreation;
        window.testLoginCall = testLoginCall;
        window.testRealLogin = testRealLogin;
        window.Client = Client;
        window.LoginRequest = LoginRequest;
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        function testClientCreation() {
            try {
                const client = new Client('https://api.example.com');
                addResult('✅ Client creation successful!', 'success');
                addResult(`📝 Client object: ${typeof client}`, 'info');
                client.free();
            } catch (error) {
                addResult(`❌ Client creation failed: ${error.message}`, 'error');
            }
        }
        
        async function testLoginCall() {
            const client = new Client('https://dev-api.angelq.ai');
            const loginRequest = new LoginRequest('test@example.com', 'testpassword');
            
            addResult('🔄 Attempting login with test credentials...', 'info');
            
            try {
                const result = await client.login(loginRequest);
                const cookie = result.cookie;
                const user = result.user;
                
                addResult('✅ Login call successful!', 'success');
                addResult(`🍪 Cookie: ${cookie.value.substring(0, 20)}...`, 'success');
                addResult(`👤 User: ${user.email}`, 'info');
                
                cookie.free();
                user.free();
                result.free();
            } catch (error) {
                const errorMsg = error.message.toLowerCase();
                
                if (errorMsg.includes('login failed') || 
                    errorMsg.includes('invalid') || 
                    errorMsg.includes('unauthorized')) {
                    addResult('✅ API correctly rejected invalid credentials', 'success');
                    addResult(`🔒 Auth error: ${error.message}`, 'info');
                } else if (errorMsg.includes('cors')) {
                    addResult('⚠️ CORS error - API responding but browser security blocking', 'info');
                    addResult('✅ This confirms the WASM client can make requests', 'success');
                } else if (errorMsg.includes('network') || errorMsg.includes('fetch')) {
                    addResult('🌐 Network error - API may be down or unreachable', 'info');
                    addResult('✅ Login method is functional', 'success');
                } else {
                    addResult(`📝 API response: ${error.message}`, 'info');
                    addResult('✅ Login method executed successfully', 'success');
                }
            }
            
            try { loginRequest.free(); } catch {}
            client.free();
        }
        
        async function testRealLogin() {
            const client = new Client('https://dev-api.angelq.ai');
            const loginRequest = new LoginRequest('lucas.kaique@angelkids.ai', 'somePassword');
            
            addResult('🔄 Testing real login credentials...', 'info');
            addResult('📧 Email: lucas.kaique@angelkids.ai', 'info');
            
            try {
                const result = await client.login(loginRequest);
                const cookie = result.cookie;
                const user = result.user;
                
                addResult('🎉 Real login successful!', 'success');
                addResult(`👤 Welcome ${user.first_name || user.email}!`, 'success');
                addResult(`📧 Email confirmed: ${user.email}`, 'success');
                addResult(`🍪 Session cookie received`, 'success');
                addResult(`🆔 User ID: ${user.id}`, 'info');
                
                cookie.free();
                user.free();
                result.free();
            } catch (error) {
                const errorMsg = error.message.toLowerCase();
                
                if (errorMsg.includes('login failed') || 
                    errorMsg.includes('invalid') || 
                    errorMsg.includes('unauthorized')) {
                    addResult('🔒 Authentication failed - invalid credentials', 'error');
                    addResult('💡 This may mean the password is incorrect', 'info');
                } else if (errorMsg.includes('cors')) {
                    addResult('⚠️ CORS error - browser blocked request', 'info');
                    addResult('✅ But this confirms WASM client is working!', 'success');
                } else if (errorMsg.includes('network') || errorMsg.includes('fetch')) {
                    addResult('🌐 Network error - API may be down', 'info');
                    addResult('✅ Login method is functional', 'success');
                } else {
                    addResult(`📝 API response: ${error.message}`, 'info');
                    addResult('✅ Login method executed successfully', 'success');
                }
            }
            
            try { loginRequest.free(); } catch {}
            client.free();
        }
        
        // Run initial tests
        addResult('🎯 WASM module loaded successfully!', 'success');
        testClientCreation();
    </script>
</body>
</html>
